# nginx para el frontend UDESTRO (etapa "production" del Dockerfile)
server {
    # Mismo puerto que el dev server para no cambiar URLs entre modos
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compresion para JS/CSS del bundle
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Cache agresiva para assets con hash en el nombre
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA: cualquier ruta desconocida (React Router) devuelve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
